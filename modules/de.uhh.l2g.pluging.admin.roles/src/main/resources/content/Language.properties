pending-producer-note="<div style='max-width: 550px'><p>Wählen&nbsp;Sie bitte einmalig&nbsp;Ihre Fakultät aus, um Produzierenden-Rechte im entsprechenden&nbsp;Bereich zu erhalten.&nbsp;Falls Sie keiner Fakultät angehören, wählen Sie bitte 'Sonstige Einrichtungen der UHH'.</p><p>Bitte kontrollieren Sie Ihre Angabe, da sie&nbsp;nicht selbstständig gewechselt werden kann.</p><p>Wie Sie Inhalte auf Lecture2Go anlegen und hochladen können, erfahren Sie hier:&nbsp;<a href='https://www.uni-hamburg.de/elearning/werkzeuge/veranstaltungsaufzeichnung/lecture2go.html' target='_blank'>https://www.uni-hamburg.de/elearning/werkzeuge/veranstaltungsaufzeichnung/lecture2go.html</a></p></div>"
