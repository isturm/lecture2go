components:
  schemas:
    Lectureseries:
      description: A lecture series
      properties:
        lectureseriesId:
          description: Lectureseries ID of the lectureseries.
          type: integer
          format: int64
        number:
          description: Number of the lectureseries.
          type: string
        name:
          description: Name of the lectureseries.
          type: string
        longDesc:
          description: Long desc of the lectureseries.
          type: string
        closedAccessURI:
          description: Closed access URI of the lectureseries.
          type: string
        openAccessURI:
          description: Open access URI of the lectureseries.
          type: string
        creators:
          items:
            $ref: "#/components/schemas/Creator"
          type: array
        categories:
          items:
            $ref: "#/components/schemas/Category"
          type: array
        term:
          $ref: "#/components/schemas/Term"
        institutions:
          items:
            $ref: "#/components/schemas/Institution"
          type: array
      type: object
    Video:
      description: A video or similar media type
      properties:
        videoId:
          description: Video ID of the video.
          type: integer
          format: int64
        lectureseriesId:
          description: Lectureseries ID of the lectureseries.
          type: integer
          format: int64
        title:
          description: Title of the video.
          type: string
        url:
          description: Complete URL to the open access video.
          type: string
        embedIframe:
          description: Complete iframe embed code.
          type: string
        containerFormat:
          description: Container format of the video.
          type: string
        duration:
          description: Duration of the video.
          type: string
        generationDate:
          description: Generation date of the video.
          type: string
        openAccess:
          description: Open access of this video.
          type: integer
        downloadLink:
          description: Download link of this video.
          type: integer
        metadata:
          $ref: "#/components/schemas/Metadata"
        creators:
          items:
            $ref: "#/components/schemas/Creator"
          type: array
        categories:
          items:
            $ref: "#/components/schemas/Category"
          type: array
        term:
          $ref: "#/components/schemas/Term"
        institutions:
          items:
            $ref: "#/components/schemas/Institution"
          type: array
        license:
          $ref: "#/components/schemas/License"
      type: object
    Metadata:
      description: Video Metadata.
      properties:
        metadataId:
          description: Metadata ID of the metadata.
          type: integer
          format: int64
        language:
          description: Language of the metadata.
          type: string
        subject:
          description: Subject of the metadata.
          type: string
        description:
          description: Description of the metadata.
          type: string
      type: object
    Creator:
      description: Video Creator.
      properties:
        creatorId:
          description: Creator ID of the creator.
          type: integer
          format: int64
        fullName:
          description: Full name of the creator.
          type: string
      type: object
    Category:
      description: A category.
      properties:
        categoryName:
          description: Name of the category.
          type: string
      type: object
    Term:
      description: A term.
      properties:
        termId:
          description: Term ID of the term.
          type: integer
          format: int64
        termName:
          description: Name of the term.
          type: string
      type: object
    Institution:
      description: An institution.
      properties:
        institutionName:
          description: Name of the institution.
          type: string
      type: object
    License:
      description: A license.
      properties:
        licenseId:
          description: License ID of the license.
          type: integer
          format: int64
        fullName:
          description: Full name of the license.
          type: string
        shortIdentifier:
          description: Short identifier of the license.
          type: string
      type: object
info:
  description: ""
  license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
  title: "Lecture2Go API"
  version: v1.0
openapi: 3.0.1
paths:
  "/lectureseries/{lectureseriesId}":
    get:
      operationId: getLectureseries
      parameters:
        - in: path
          name: lectureseriesId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lectureseries"
            application/xml:
              schema:
                $ref: "#/components/schemas/Lectureseries"
          description: ""
      tags: ["Lectureseries"]
  "/videos":
      get:
        operationId: getVideosPage
        parameters:
        - in: query
          name: lectureseriesId
          schema:
            type: integer
            format: int64
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: pageSize
          schema:
            type: integer
        - in: query
          name: producerRestricted
          schema:
            type: boolean
        responses:
          200:
            content:
              application/json:
                schema:
                  items:
                    $ref: "#/components/schemas/Video"
                  type: array
              application/xml:
                schema:
                  items:
                    $ref: "#/components/schemas/Video"
                  type: array
            description: ""
        tags: ["Video"]